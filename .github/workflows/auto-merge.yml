name: Auto Merge PR

on:
  workflow_run:
    workflows: ["CI-CD Pipeline"]
    types: [completed]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge:
    name: Auto merge after CI success
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request'
      )

    steps:
      - name: Debug trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run_conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "workflow_run_event=${{ github.event.workflow_run.event }}"

      - name: Squash merge PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            if (context.eventName === "workflow_dispatch") {
              core.notice("Manual test run completed. Merge logic is skipped for workflow_dispatch.");
              return;
            }

            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.notice("No pull request found for this workflow_run. Skipping.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            if (pull.state !== "open") {
              core.notice(`PR #${pull_number} is not open. Current state: ${pull.state}`);
              return;
            }

            if (pull.head.sha !== run.head_sha) {
              core.notice(
                `Head SHA changed since CI run (${run.head_sha} -> ${pull.head.sha}). Skipping stale run.`
              );
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: "squash"
              });
              core.info(`PR #${pull_number} merged with squash.`);
            } catch (error) {
              core.setFailed(
                `Failed to merge PR #${pull_number}: ${error.message}`
              );
            }
